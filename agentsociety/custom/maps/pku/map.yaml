interactions:
- id: enter_campus
  name: 进入校园
  description: Enter or leave campus through a gate while checking plans.
  allowed_location_ids:
  - west_gate
  - east_gate
  - south_gate
  effects:
    social_context: campus_daily_life
- id: meet_at_gate
  name: 校门碰头
  description: Meet someone at a campus gate before moving inward.
  allowed_location_ids:
  - east_gate
  - west_gate
