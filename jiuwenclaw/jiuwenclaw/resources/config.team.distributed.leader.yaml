    allow_from: []
    enable_streaming: true
    send_thinking_message: false
    enabled: false
    send_file_allowed: true
    # 群聊数字分身（默认关闭）
    group_digital_avatar: false
    my_user_id: ""
    bot_name: ""
    enable_memory: false

# ========== 细粒度权限管控（tiered_policy）==========
#
# schema: tiered_policy（或兼容 v_cc / v4.2）时由 tiered_policy.evaluate_tiered_policy 求值；
# permission_mode: normal|strict 决定 severity 映射，见 agentserver/permissions/tiered_policy.py。
# severity（normal）：LOW/MEDIUM→allow，HIGH/CRITICAL→ask；strict 下 MEDIUM→ask、CRITICAL→deny。
# rules[*].action: 可选显式动作 allow|ask|deny；配置后优先于 severity 映射，适合敏感文件读取、
# 系统控制等不希望随 permission_mode 漂移的规则。
# 内置参数规则 > 用户 rules；整工具存在则不用 defaults；详见 tiered_policy 模块说明。
#
# 三种动作: allow / ask / deny
permissions:
  enabled: false
  schema: tiered_policy
  permission_mode: normal

  defaults:
    "*": "allow"

  tools:
    bash: ask
    mcp_exec_command: ask
    create_terminal: ask
    write: ask
    write_file: ask
    edit_file: ask
    search_replace: ask
    write_memory: allow
    edit_memory: allow
    read_memory: allow
    memory_search: allow
    memory_get: allow
    todo_create: allow
    todo_insert: allow
    todo_complete: allow
    todo_remove: allow
    todo_list: allow
    # Coding Memory 工具权限
    coding_memory_write: allow
    coding_memory_edit: allow
    coding_memory_read: allow
    # 外接记忆工具（External Memory — OpenJiuwen / Mem0 / OpenViking）
    ltm_search: allow
    ltm_search_summary: allow
    mem0_profile: allow
    mem0_search: allow
    mem0_conclude: allow
    viking_search: allow
    viking_read: allow
    viking_browse: allow
    viking_remember: allow
    viking_add_resource: allow
    mcp_free_search: allow
    mcp_paid_search: allow
    mcp_fetch_webpage: allow
    cron_list_jobs: allow
    cron_get_job: allow
    cron_create_job: allow
    cron_update_job: allow
    cron_delete_job: allow
    cron_toggle_job: allow
    cron_preview_job: allow

  rules:
    - id: shell_allow_dir
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "dir *"
      severity: LOW
    - id: shell_allow_ls
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "ls *"
      severity: LOW
    - id: shell_allow_pwd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "pwd *"
      severity: LOW
    - id: shell_allow_cd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cd *"
      severity: LOW
    - id: shell_allow_echo
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "echo *"
      severity: LOW
    - id: shell_allow_cat
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cat *"
      severity: LOW
    - id: shell_allow_type
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "type *"
      severity: LOW
    - id: shell_allow_head
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "head *"
      severity: LOW
    - id: shell_allow_tail
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "tail *"
      severity: LOW
    - id: shell_allow_git_status
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git status *"
      severity: LOW
    - id: shell_allow_git_log
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git log *"
      severity: LOW
    - id: shell_allow_git_diff
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git diff *"
      severity: LOW
    - id: shell_allow_git_branch
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git branch *"
      severity: LOW
    - id: shell_ask_rm
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "rm *"
      severity: HIGH
    - id: shell_ask_del
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "del *"
      severity: HIGH
    - id: shell_ask_rd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "rd *"
      severity: HIGH
    - id: shell_ask_mv
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "mv *"
      severity: HIGH
    - id: shell_ask_cp
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cp *"
      severity: HIGH
    - id: shell_ask_chmod
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "chmod *"
      severity: HIGH
    - id: shell_ask_chown
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "chown *"
      severity: HIGH
    - id: shell_ask_sensitive_file_reads
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: 're:(?i)(^|[\s;&|()])((cat|type|less|more|head|tail|grep|find|Get-Content|Select-String)\b[^;&|]*(id_rsa|id_ed25519|\.pem\b|\.pfx\b|\.key\b|\.kube/config|\.aws/(credentials|config)|\.npmrc\b|\.env(\.[A-Za-z0-9_-]+)?\b|authorized_keys|\.ssh/))'
      severity: HIGH
    - id: path_ask_ssh
      tools: [read_file, write_file, edit_file, read_text_file, write_text_file, write, read, glob_file_search, glob, list_dir, list_files, grep, search_replace]
      pattern: "**/.ssh/**"
      severity: HIGH
    - id: path_ask_env
      tools: [read_file, write_file, edit_file, read_text_file, write_text_file, write, read, glob_file_search, glob, list_dir, list_files, grep, search_replace]
      pattern: "**/.env*"
      severity: HIGH

  # 数字分身 owner-scoped 权限（默认空，不生效）
  owner_scopes: {}
  deny_guidance_message: ""

  # 外部目录访问 (访问 workspace 外路径时的权限)
  external_directory:
    "*": "ask"

browser:
  # chrome_path can be a string or per-OS map.
  # Example:
  # chrome_path:
  #   windows: "C:\\Users\\YOUR_USER\\AppData\\Local\\Google\\Chrome\\Application\\chrome.exe"
  #   macos: "/Applications/Google Chrome.app"
  #   linux: "/usr/bin/google-chrome"
  remote_debugging_address: "127.0.0.1"
  remote_debugging_port: 9222
  # empty means use launcher default profile path by OS
  user_data_dir: ""
  profile_directory: "Default"

updater:
  enabled: true
  repo_owner: CharlieZhao95
  repo_name: jiuwenclaw
  release_api_url: ""
  asset_name_pattern: "jiuwenclaw-setup-{version}.exe"
  sha256_name_pattern: "jiuwenclaw-setup-{version}.exe.sha256"
  timeout_seconds: 20

extensions:
  # 扩展包搜索目录（字符串），用 ';' 分割多个目录：
  # EXTENSION_DIRS="E:/a;D:/b"
  extension_dirs: ${EXTENSION_DIRS:-}


team:
  # Distributed leader template. Copy this file to
  # <LEADER_HOME>/.jiuwenclaw/config/config.yaml and adjust registry/storage/ports.
  runtime:
    mode: distributed
    role: leader

  team_name: jiuwen_team
  lifecycle: persistent
  teammate_mode: build_mode
  spawn_mode: inprocess

  leader:
    member_name: team_leader
    display_name: 团队领导
    persona: "天才项目管理专家，擅长任务分解和团队协调"

  agents:
    leader:
      workspace:
        stable_base: true
      max_iterations: 200
      completion_timeout: 600.0
    teammate:
      workspace:
        stable_base: true
      max_iterations: 200
      completion_timeout: 600.0

  workspace:
    enabled: true
    root_path: ${JIUWEN_TEAM_WORKSPACE_ROOT:-/tmp/jiuwenclaw/shared_workspace/jiuwen_team}
    version_control: false

  transport:
    type: pyzmq
    params:
      request_timeout: 20
      direct_addr: tcp://0.0.0.0:28555
      pubsub_publish_addr: tcp://127.0.0.1:28556
      pubsub_subscribe_addr: tcp://127.0.0.1:28557
      metadata:
        pubsub_bind: true

  storage:
    type: postgresql
    params:
      connection_string: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/jiuwen_team

mcp:
  servers: []
  # 示例：
  # servers:
  #   - name: playwright
  #     enabled: true
  #     transport: stdio
  #     command: python
  #     args: ["path/to/server.py", "--transport", "stdio"]
  #     cwd: .
