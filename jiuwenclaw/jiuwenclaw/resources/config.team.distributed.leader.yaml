# 前端显示语言：zh（中文）/ en（英文），与 Web 界面语言切换同步
preferred_language: zh

# 日志目录：~/.jiuwenclaw/agent/.logs/
# gateway.log / channel.log / agent_server.log 按源码路径分流；full.log 为汇总。
# level：未单独指定时的默认级别。console_level：控制台；可省略则用 level。
# 环境变量 LOG_LEVEL 仅覆盖控制台级别（不覆盖各日志文件）。
logging:
  level: INFO
  console_level: INFO
  gateway: INFO
  channel: INFO
  agent_server: INFO
  full: INFO

memory:
  # ============================================================
  # 记忆系统配置
  # ============================================================
  # 两个正交开关：
  #   1) engine — 挂载哪套 rail（内置 / 外接 / 都挂 / 都不挂）
  #   2) mode   — 内置记忆的存储位置（local | cloud），不影响外接
  #
  # 外接 rail 的启用 = (engine ∈ {external, both}) AND (external.provider 非空)
  # 内置 rail 的启用 = (engine ∈ {builtin, both})  AND (mode=local)
  #                    AND modes.agent.<当前 mode>.memory.enabled=true
  # ============================================================

  mode: ${MEMORY_MODE:-local}            # 内置记忆存储位置：local | cloud
  # 记忆引擎总开关：builtin | external | both | none
  #   builtin  — 仅内置记忆（默认，兼容旧配置）
  #   external — 仅外接记忆（LTM / Mem0 / OpenViking / 插件）
  #   both     — 内置 + 外接并存
  #   none     — 全部关闭
  engine: ${MEMORY_ENGINE:-builtin}
  forbidden_memory_definition:
    enabled: false
    patterns: []
    description:
      zh: "以下内容禁止记忆：密码、API密钥、Secret、Token、信用卡号、身份证号、手机号等敏感信息"
      en: "The following content is forbidden to remember: passwords, API keys, secrets, tokens, credit card numbers, ID numbers, phone numbers and other sensitive information"

  # ------------------------------------------------------------
  # 外接记忆（External Memory）
  # ------------------------------------------------------------
  # 启用方式（任选一种）：
  #
  # 【方案 1：YAML 直接改】
  #   memory.engine: external   # 或 both
  #   memory.external.provider: mem0   # 选一个：openjiuwen | mem0 | openviking
  #   # 然后在下方对应的 mem0/openjiuwen/openviking 子段填 api_key 或 endpoint
  #
  # 【方案 2：环境变量覆盖】
  #   export MEMORY_ENGINE=external
  #   export MEMORY_EXTERNAL_PROVIDER=mem0
  #   export MEM0_API_KEY=sk-xxx
  #
  # 【关闭外接记忆】
  #   把 memory.engine 改回 builtin 或 none；
  #   或把 memory.external.provider 留空（两者任一生效即可禁用）
  #
  # 【挂载模式常见组合】
  #   ┌─────────────┬───────────────┬──────────────────────────────────────┐
  #   │ engine      │ provider      │ 效果                                 │
  #   ├─────────────┼───────────────┼──────────────────────────────────────┤
  #   │ builtin     │ *             │ 只挂内置（默认；外接即使填了也不挂） │
  #   │ external    │ openjiuwen    │ 只挂外接 LTM                         │
  #   │ external    │ mem0          │ 只挂外接 Mem0                        │
  #   │ external    │ openviking    │ 只挂外接 OpenViking                  │
  #   │ external    │ <plugin-name> │ 只挂用户安装的插件                   │
  #   │ both        │ 任一          │ 内置 + 外接同时挂（LLM 两套工具并列）│
  #   │ none        │ *             │ 全关，任何记忆 rail 都不挂           │
  #   └─────────────┴───────────────┴──────────────────────────────────────┘
  #
  # 说明：
  # - 外接记忆 mode-independent：配置一次，plan / fast 模式全程生效，
  #   跨 config 热重载持久存活（保留 prefetch 缓存、电路断路器、会话状态）
  # - 单 provider 策略：同一时刻 provider 只能选一个
  # - 失败降级：provider 构建失败或网络异常不阻塞主流程
  external:
    # 选哪家 provider。空字符串 = 禁用外接（等价于 engine=builtin）
    provider: ${MEMORY_EXTERNAL_PROVIDER:-}   # '' | openjiuwen | mem0 | openviking | <plugin-name>
    # 数据隔离标识（所有 provider 共用）
    user_id: ${MEMORY_USER_ID:-__default__}
    scope_id: ${MEMORY_SCOPE_ID:-__default__}

    # -- OpenJiuwen LTM（本地长期记忆：KV + 向量 + DB）--
    # 生效条件：provider='openjiuwen'
    # 依赖顶层 embed 段提供 embedding 配置（不单独配置 api_key）
    openjiuwen:
      kv_type: shelve                                    # shelve | in_memory | sqlite
      kv_path: ${MEMORY_KV_PATH:-}                       # 默认 ~/.jiuwenclaw/memory/ltm/kv
      vector_type: chroma                                # chroma
      vector_persist_dir: ${MEMORY_VECTOR_DIR:-}         # 默认 ~/.jiuwenclaw/memory/ltm/chroma
      db_type: sqlite
      db_path: ${MEMORY_DB_PATH:-}                       # 默认 ~/.jiuwenclaw/memory/ltm/ltm.db

    # -- Mem0（云端事实抽取+语义检索）--
    # 生效条件：provider='mem0'
    # 必填：api_key（从 mem0.ai 获取）
    mem0:
      api_key: ${MEM0_API_KEY:-}
      user_id: ${MEM0_USER_ID:-jiuwenclaw-user}
      agent_id: ${MEM0_AGENT_ID:-jiuwenclaw}
      rerank: true                                       # 搜索结果重排序（更准但更慢）

    # -- OpenViking（字节上下文数据库）--
    # 生效条件：provider='openviking'
    # 必填：endpoint 可访问
    openviking:
      endpoint: ${OPENVIKING_ENDPOINT:-http://127.0.0.1:1933}
      api_key: ${OPENVIKING_API_KEY:-}
      account: ${OPENVIKING_ACCOUNT:-root}
      user: ${OPENVIKING_USER:-default}

models:
  default:
    model_client_config:
      api_base: ${API_BASE}
      api_key: ${API_KEY}
      model_name: ${MODEL_NAME:-xiaomi/mimo-v2-omni}
      client_provider: ${MODEL_PROVIDER}
      timeout: 1800
      verify_ssl: false
      custom_headers: {}
    model_config_obj:
      temperature: 0.95
  video:
    model_client_config:
      api_base: ${VIDEO_API_BASE}
      api_key: ${VIDEO_API_KEY}
      model_name: ${VIDEO_MODEL_NAME:-xiaomi/mimo-v2-omni}
      client_provider: ${VIDEO_PROVIDER}
      timeout: 1800
      verify_ssl: false
    model_config_obj:
      temperature: 0.95
  audio:
    model_client_config:
      api_base: ${AUDIO_API_BASE}
      api_key: ${AUDIO_API_KEY}
      model_name: ${AUDIO_MODEL_NAME:-openai/gpt-4o-audio-preview}
      client_provider: ${AUDIO_PROVIDER}
      verify_ssl: false
      timeout: 1800
    model_config_obj:
      temperature: 0.95
  vision:
    model_client_config:
      api_base: ${VISION_API_BASE}
      api_key: ${VISION_API_KEY}
      model_name: ${VISION_MODEL_NAME:-bytedance-seed/seed-2.0-mini}
      client_provider: ${VISION_PROVIDER}
      verify_ssl: false
      timeout: 1800
    model_config_obj:
      temperature: 0.95
  image_gen:
    model_client_config:
      api_base: ${IMAGE_GEN_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
      api_key: ${IMAGE_GEN_API_KEY}
      model_name: ${IMAGE_GEN_MODEL_NAME:-qwen-image-max}
      client_provider: ${IMAGE_GEN_PROVIDER:-DashScope}
      verify_ssl: false
      timeout: 1800
    model_config_obj:
      temperature: 0.95

telemetry:
  enabled: false                    # 总开关（环境变量 OTEL_ENABLED 优先）
  exporter: otlp                    # otlp / console / none
  endpoint: http://localhost:4317   # OTLP endpoint
  protocol: grpc                    # grpc / http
  headers: {}                       # 公共 OTLP headers，可被 traces/metrics 覆盖
  log_messages: true                # 是否在 span event 中记录完整消息内容
  service_name: jiuwenclaw
  provider_factory:                 # 自定义 provider factory，格式：module:function
  traces:
    exporter:                       # trace exporter，默认回退到 telemetry.exporter
    endpoint:                       # trace endpoint，默认回退到 telemetry.endpoint
    protocol:                       # trace protocol，默认回退到 telemetry.protocol
    headers: {}                     # trace headers，默认回退到 telemetry.headers
  metrics:
    exporter:                       # metrics exporter，默认回退到 telemetry.exporter
    endpoint:                       # metrics endpoint，默认回退到 telemetry.endpoint
    protocol:                       # metrics protocol，默认回退到 telemetry.protocol
    headers: {}                     # metrics headers，默认回退到 telemetry.headers

react:
  agent_name: main_agent
  max_iterations: 100
  model_name: ${MODEL_NAME:-deepseek-chat}
  skill_mode: all
  # code_agent / research_agent 默认不启用；只有显式配置 enabled: true 才会显示并可被 task_tool 调用
  # browser_agent 保持原行为，仍由浏览器 runtime 开关决定是否默认注册；这里只支持覆盖其参数
  subagents:
    code_agent:
      enabled: false
      # max_iterations: 15
    research_agent:
      enabled: false
      # max_iterations: 15
  answer_chunk_size: 500
  stream_chunk_threshold: 50
  stream_character_threshold: 2000
  context_engine_config:
    enable_kv_cache_release: false
    enable_reload: true
    enabled: true
    message_summary_offloader_config:
      messages_threshold:
      tokens_threshold: 60000
      large_message_threshold: 60000
      offload_message_type: ["tool"]
      protected_tool_names: ["read_file:*SKILL.md", "reload_original_context_messages"]
      messages_to_keep:
      keep_last_round: false
      customized_summary_prompt:
      enable_adaptive_compression: true
      summary_max_tokens: 900
      enable_precise_step: false
      step_summary_max_context_messages: 8
      content_max_chars_for_compression: 200000
    dialogue_compressor_config:
      messages_threshold:
      tokens_threshold: 100000
      messages_to_keep: 10
      keep_last_round: false
      compression_target_tokens: 1800
      offload_writeback_enabled: false
    current_round_compressor_config:
      tokens_threshold: 100000
      messages_to_keep: 3
      min_selected_tokens_for_compression: 20000
      compression_target_tokens: 4000
      summary_merge_target_tokens: 4000
      accumulated_summary_token_limit: 20000
      summary_merge_min_blocks: 3
      prior_context_window_size: 10
      offload_writeback_enabled: false
    round_level_compressor_config:
      rounds_threshold: 2
      tokens_threshold: 230000
      trigger_total_tokens: 230000
      target_total_tokens: 160000
      compression_call_max_tokens: 250000
      keep_last_round: true
      keep_recent_messages: 6
      messages_to_keep: 6
      first_pass_target_tokens: 30000
      second_pass_target_tokens: 20000
      third_pass_target_tokens: 10000
      truncate_head_ratio: 0.2
      offload_writeback_enabled: false
  # Skills 在线自演进配置
  evolution:
    enabled: true             # true = 启用在线 Skills 自演进
    auto_scan: false           # true = 每轮对话后自动扫描（建议先用手动 /evolve）
    skill_base_dir: "agent/skills"  # Skill 根目录
  a2x_registry:
    base_url: "http://127.0.0.1:8000"
    timeout: 30.0
    api_key: ""
    # null uses the SDK default ownership store under the process HOME.
    # Keep ownership persistent so teardown can call replace_agent_card safely.
    ownership_file:
    # Allowed values: teammate / teamleader
    role: "teamleader"
    # When role=teammate, automatic blank-agent registration during agent
    # initialization calls AsyncA2XRegistryClient.register_blank_agent(...).
    # Both dataset and endpoint must be configured explicitly; if either is
    # missing, auto-registration is skipped and only a log is recorded.
    dataset: "team_pool"
    endpoint: ""

tools:
  - todo
  - skill

email_settings:
  email_address: ${EMAIL_ADDRESS}
  token: ${EMAIL_TOKEN}
  smtp_server: ${SMTP_SERVER:-smtp.gmail.com}
  port: ${EMAIL_PORT:-587}

embed:
  embed_api_key: ${EMBED_API_KEY}
  embed_base_url: ${EMBED_API_BASE}
  embed_model: ${EMBED_MODEL}

task_memory:
  # Set enabled: true to activate TaskMemoryService skill tools
  # (experience_retrieve, experience_learn, experience_clear)
  enabled: true
  # Override defaults below if task memory uses a different model/key than the main agent
  llm_model: ${TASK_MEMORY_LLM_MODEL}
  embedding_model: ${TASK_MEMORY_EMBED_MODEL}
  api_key: ${TASK_MEMORY_API_KEY}
  api_base: ${TASK_MEMORY_API_BASE}
  # Retrieval and summary algorithms: ACE | ReasoningBank | ReMe
  retrieval_algo: ACE
  summary_algo: ACE

gateway:
  # SessionMap 仅用于企业claw场景，如 feishu_enterprise 等通道：将平台身份映射为 Agent 的 session_id。
  # 取值：per_chat_bot（默认，同 chat+bot 共享会话）, per_chat_bot_user（按 user 分会话）
  session_map_scope: per_chat_bot

heartbeat:
  # 心跳间隔（秒），默认 60
  every: 3600
  # 心跳结果回传的 channel（如 "web"），
  target: web
  # 心跳生效时间段（本地时间），start <= now < end 时心跳生效
  active_hours:
    start: 08:00
    end: 22:00

