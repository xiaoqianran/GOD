  #       LOG_LEVEL: INFO
  #   - name: local-sse
  #     enabled: false
  #     transport: sse
  #     url: http://127.0.0.1:9000/sse
  #     headers:
  #       Authorization: Bearer ${MCP_TOKEN}
  #     timeout_s: 30

modes:
  # 一级模式 agent / code / team
  agent:
    # agent 模式支持 性能/规划/集群
    fast:
      memory:
        enabled: true
        is_proactive: false
      rails:
      tools:
    plan:
      memory:
        enabled: true
        is_proactive: true
      rails:
      tools:
  code:
    # 动态 Rails — 列表中出现的 = 启用；不出现的 = 不启用
    # 固定 Rails（RuntimePromptRail/ResponsePromptRail/JiuClawStreamEventRail/SecurityRail/PermissionInterruptRail）
    # 写死在代码中，不在此配置
    rails:
      - FileSystemRail
      - SkillUseRail
      - LspRail

    # 动态 Tools — 列表中出现的 = 启用
    # send_file_to_user 由运行时 _update_session_tools 注册，不在此配置
    # coding_memory_read/write/edit 由 CodingMemoryRail 在 subagent 内部注册，不在此配置
    tools:
      - web_free_search
      - web_fetch_webpage
      - web_paid_search
      - user_todos

    embedding_config:
      model_name:
      base_url:
      api_key:
  team:
    jiuwen_team:
      team_name: jiuwen_team
      lifecycle: persistent
      teammate_mode: build_mode
      spawn_mode: inprocess

      leader:
        member_name: team_leader
        display_name: 团队领导
        persona: "天才项目管理专家，擅长任务分解和团队协调"

      agents:
        leader:
          workspace:
            stable_base: true
          max_iterations: 200
          completion_timeout: 600.0
        teammate:
          workspace:
            stable_base: true
          max_iterations: 200
          completion_timeout: 600.0

      workspace:
        enabled: true
        root_path: ${JIUWEN_TEAM_WORKSPACE_ROOT:-/tmp/jiuwenclaw/shared_workspace/jiuwen_team}
        version_control: false

      transport:
        type: pyzmq
        params:
          request_timeout: 20
          direct_addr: tcp://0.0.0.0:28555
          pubsub_publish_addr: tcp://127.0.0.1:28556
          pubsub_subscribe_addr: tcp://127.0.0.1:28557
          metadata:
            pubsub_bind: true

      storage:
        type: postgresql
        params:
          connection_string: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/jiuwen_team
