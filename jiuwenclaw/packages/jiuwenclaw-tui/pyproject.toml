[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jiuwenclaw-tui"
version = "0.1.11"
description = "Native terminal UI launcher for JiuwenClaw"
requires-python = ">=3.11,<3.14"
license = { text = "Apache-2.0" }
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]

[project.scripts]
jiuwenclaw-tui = "jiuwenclaw_tui.app:main"

[tool.setuptools]
py-modules = []
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["jiuwenclaw_tui*"]
namespaces = false

[tool.setuptools.package-data]
"*" = ["LICENSE"]
jiuwenclaw_tui = [
    "resources/**/*",
    "resources/*",
]